version: '3.8'

services:
  shopee-postgres:
    image: postgres:16-alpine
    container_name: shopee_postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_shopee_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_shopee_data: